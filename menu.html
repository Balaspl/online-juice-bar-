<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juice Order</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
}

/* background */

.background img{
    position:relative;
    width:100%;
    height:100vh;
    object-fit:cover;
}

/* heading */

.adds{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:gold;
    text-align:center;
}

.adds p{
    font-size:20px;
    font-weight:bold;
}

/* form */

.form{
    padding:20px;
    position:absolute;
    top:230px;
    left:50%;
    transform:translateX(-50%);
    border:2px solid gold;
    border-radius:15px 0;
    box-shadow:10px 8px 15px #de970088;
}

label{
    color:gold;
    text-shadow:1px 0 21px gold;
}

select,input{
    width:110px;
    background:white;
    color:brown;
    border-radius:3px;
    text-align:center;
}

button{
    background:gold;
    color:brown;
    border-radius:5px;
    padding:6px;
    font-weight:bold;
    margin-left:65%;
    margin-top:10px;
}

/* marquee */

.marq{
    position:absolute;
    bottom:50px;
    width:100%;
    overflow:hidden;
}

.track{
    display:flex;
    width:max-content;
    animation:scroll 30s linear infinite;
}

.track img{
    width:100px;
    height:100px;
    margin-right:20px;
    border-radius:10px;
    background:white;
}

/* continuous animation */

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

/* footer */

.footer{
    position:absolute;
    bottom:0;
    width:100%;
    text-align:center;
    color:gold;
}

</style>
</head>
